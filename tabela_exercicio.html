<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabela HTML</title>
    <style>
      table,
      tr,
      th,
      td {
        border: 1px solid;
        border-collapse: collapse;
        font-size: 30px;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <table>
      <thead>
        <tr>
          <th colspan="5" style="background-color: blue">Usuários</th>
        </tr>
        <tr>
          <!-- 1ª linha -->
          <th>Nome</th>
          <th>Foto</th>
          <th>Contato</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <!-- 2ª linha -->
        <tr>
          <td>Cleilson Santos</td>
          <th>
            <img src="/imagens/user1.png" alt="imagem_user1" width="100" height:
            auto />
          </th>
          <td>(85) 99999.999</td>
          <td>Ativo</td>
        </tr>
        <tr>
          <td>Teste do teste</td>
          <th>
            <img src="imagens/user2.png" alt="imagem_user2" width="100" height:
            auto />
          </th>
          <td>(85) 99985855</td>
          <td>Inativo</td>
        </tr>
        <tr>
          <td>Emilio</td>
          <td>
            <img src="imagens/user3.png" alt="imagem_user3" width="100" height:
            auto/>
          </td>

          <td>(85) 99985855</td>
          <td>Ativo</td>
        </tr>
      </tbody>

      <tfoot></tfoot>
    </table>
  </body>
</html>
